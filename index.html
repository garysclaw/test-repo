<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Agent Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 0 0 rgba(63,185,80,0.6);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(63,185,80,0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(63,185,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
    }

    .status-bar {
      font-size: 0.8rem;
      color: #8b949e;
    }

    .status-bar span {
      color: #3fb950;
      font-weight: 500;
    }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #58a6ff;
    }

    .stat-card .value.green { color: #3fb950; }
    .stat-card .value.yellow { color: #d29922; }
    .stat-card .value.purple { color: #bc8cff; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .current-task {
      background: #161b22;
      border: 1px solid #388bfd40;
      border-left: 4px solid #388bfd;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .current-task .task-label {
      font-size: 0.75rem;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .current-task .task-text {
      font-size: 1.05rem;
      font-weight: 500;
    }

    .current-task .task-time {
      font-size: 0.78rem;
      color: #8b949e;
      margin-top: 6px;
    }

    .activity-log {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
    }

    .log-header {
      padding: 14px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-header span { font-size: 0.85rem; color: #8b949e; }

    .refresh-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      transition: background 0.15s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-entry:hover { background: #1c2128; }
    .log-entry:last-child { border-bottom: none; }

    .log-icon {
      font-size: 1.1rem;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .log-content { flex: 1; }

    .log-action {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .log-detail {
      font-size: 0.78rem;
      color: #8b949e;
    }

    .log-time {
      font-size: 0.72rem;
      color: #484f58;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 8px;
    }

    .badge-success { background: #1a3a2a; color: #3fb950; }
    .badge-info    { background: #1a2a3a; color: #58a6ff; }
    .badge-warn    { background: #3a2a1a; color: #d29922; }
    .badge-error   { background: #3a1a1a; color: #f85149; }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #484f58;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    footer {
      text-align: center;
      padding: 32px;
      color: #484f58;
      font-size: 0.78rem;
    }

    #last-updated {
      color: #484f58;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

<header>
  <h1>
    <div class="pulse"></div>
    Claude Agent Dashboard
  </h1>
  <div class="status-bar">
    Auto-refreshing every <span>5s</span> &nbsp;|&nbsp; <span id="last-updated">Loading...</span>
  </div>
</header>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Actions</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed</div>
      <div class="value green" id="stat-success">—</div>
    </div>
    <div class="stat-card">
      <div class="label">In Progress</div>
      <div class="value yellow" id="stat-progress">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Errors</div>
      <div class="value" style="color:#f85149" id="stat-errors">—</div>
    </div>
  </div>

  <div id="current-task-section"></div>

  <div class="section-title">Activity Log</div>
  <div class="activity-log">
    <div class="log-header">
      <span id="log-count">Loading...</span>
      <button class="refresh-btn" onclick="fetchActivity()">↻ Refresh</button>
    </div>
    <div id="log-entries">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <div>Loading activity...</div>
      </div>
    </div>
  </div>

</div>

<footer>
  Claude Agent Dashboard &mdash; Updates every 5 seconds &mdash; <a href="https://github.com/garysclaw/test-repo" style="color:#58a6ff">View Repo</a>
</footer>

<script>
  const ACTIVITY_URL = 'https://raw.githubusercontent.com/garysclaw/test-repo/main/activity.json?nocache=' + Date.now();

  const TYPE_ICONS = {
    tool:    '🔧',
    bash:    '💻',
    file:    '📄',
    github:  '🐙',
    search:  '🔍',
    web:     '🌐',
    think:   '🧠',
    done:    '✅',
    error:   '❌',
    start:   '🚀',
    message: '💬',
    plan:    '📋',
  };

  const STATUS_BADGE = {
    success:    '<span class="badge badge-success">done</span>',
    in_progress:'<span class="badge badge-warn">in progress</span>',
    error:      '<span class="badge badge-error">error</span>',
    info:       '<span class="badge badge-info">info</span>',
  };

  function timeAgo(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 5)   return 'just now';
    if (diff < 60)  return diff + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return new Date(iso).toLocaleDateString();
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  }

  async function fetchActivity() {
    try {
      const url = 'https://raw.githubusercontent.com/garysclaw/test-repo/main/activity.json?t=' + Date.now();
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderDashboard(data);
      document.getElementById('last-updated').textContent = 'Updated ' + timeAgo(new Date().toISOString());
    } catch(e) {
      document.getElementById('last-updated').textContent = 'Error loading data';
      console.error(e);
    }
  }

  function renderDashboard(data) {
    const entries = data.entries || [];

    // Stats
    document.getElementById('stat-total').textContent    = entries.length;
    document.getElementById('stat-success').textContent  = entries.filter(e => e.status === 'success').length;
    document.getElementById('stat-progress').textContent = entries.filter(e => e.status === 'in_progress').length;
    document.getElementById('stat-errors').textContent   = entries.filter(e => e.status === 'error').length;

    // Current task
    const current = data.current_task;
    const ctSection = document.getElementById('current-task-section');
    if (current) {
      ctSection.innerHTML = `
        <div class="current-task">
          <div class="task-label">⚡ Currently Working On</div>
          <div class="task-text">${escHtml(current.task)}</div>
          <div class="task-time">Started ${timeAgo(current.started_at)}</div>
        </div>`;
    } else {
      ctSection.innerHTML = `
        <div class="current-task" style="border-left-color:#3fb950">
          <div class="task-label" style="color:#3fb950">✅ Status</div>
          <div class="task-text">Idle — waiting for next task</div>
        </div>`;
    }

    // Log count
    document.getElementById('log-count').textContent = entries.length + ' event' + (entries.length !== 1 ? 's' : '');

    // Log entries
    const container = document.getElementById('log-entries');
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>No activity yet</div></div>';
      return;
    }

    const sorted = [...entries].reverse();
    container.innerHTML = sorted.map(e => `
      <div class="log-entry">
        <div class="log-icon">${TYPE_ICONS[e.type] || '📌'}</div>
        <div class="log-content">
          <div class="log-action">${escHtml(e.action)}${STATUS_BADGE[e.status] || ''}</div>
          ${e.detail ? `<div class="log-detail">${escHtml(e.detail)}</div>` : ''}
        </div>
        <div class="log-time">${formatTime(e.timestamp)}</div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  fetchActivity();
  setInterval(fetchActivity, 5000);
</script>
</body>
</html>
